name: Deploy to GitHub Pages

on:
  # Runs on every push to the main branch
  push:
    branches: [main]
  # Allows triggering the workflow manually from the Actions tab
  workflow_dispatch:

# Grant the minimum permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Wire the job to the GitHub Pages environment so the URL is shown in the summary
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js with npm cache for faster installs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install exact versions from package-lock.json (reproducible build)
      - name: Install dependencies
        run: npm ci

      # 4. Type-check and bundle the app
      #    GITHUB_ACTIONS=true is set automatically — vite.config.ts reads it
      #    to apply base: '/mouse-maze-adventure/' for the correct subpath.
      - name: Build
        run: npm run build

      # 5. Configure the Pages deployment environment
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. Upload the dist/ folder as the Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 7. Publish to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
